name: "PR preview"

# Builds + pushes the PR image and deploys an ephemeral preview env to the homelab cluster via GitOps
# (renders the per-PR overlay under clusters/production/apps/previews/pbs-browser in hwinther/proxmox;
# Flux reconciles within ~1 min). The preview runs the REAL client against PBS and is Authelia-gated.
#
# Opt-in per PR via the `deploy-feature` label. Requires repo secrets PROXMOX_GITOPS_APP_ID +
# PROXMOX_GITOPS_APP_PRIVATE_KEY (the GitHub App that can commit to hwinther/proxmox).

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled]

concurrency:
  group: "pr-preview-${{ github.event.pull_request.number }}"
  cancel-in-progress: true

jobs:
  build:
    if: contains(github.event.pull_request.labels.*.name, 'deploy-feature')
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
      actions: write
      pull-requests: write
    uses: hwinther/reusable-workflows/.github/workflows/docker-container.yml@a0e722a6a3002b2095899c71861906262160b125 # v2.0.0
    with:
      container_registry: ghcr.io
      container_image_name_postfix: app
      build_context: .
      dockerfile: Dockerfile
      platforms: linux/amd64
      # auto = report/SARIF only on PRs (fails on other events).
      grype_fail_build: auto

  deploy-preview:
    needs: build
    if: contains(github.event.pull_request.labels.*.name, 'deploy-feature')
    permissions:
      contents: read
      pull-requests: write
    uses: hwinther/reusable-workflows/.github/workflows/gitops-preview-upsert.yml@a0e722a6a3002b2095899c71861906262160b125 # v2.0.0
    with:
      target_repo: hwinther/proxmox
      preview_base_path: clusters/production/apps/previews/pbs-browser
      pr_number: ${{ github.event.pull_request.number }}
      host: pbs-browser-${{ github.event.pull_request.number }}.preview.wsh.no
      app_name: pbs-browser
      image_tag: ${{ needs.build.outputs.version }}
      image_digest: ${{ needs.build.outputs.image_digest }}
    secrets:
      app_id: ${{ secrets.PROXMOX_GITOPS_APP_ID }}
      app_private_key: ${{ secrets.PROXMOX_GITOPS_APP_PRIVATE_KEY }}

  comment:
    needs: deploy-preview
    if: contains(github.event.pull_request.labels.*.name, 'deploy-feature')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post or update the preview-URL sticky comment
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        with:
          header: pbs-browser-preview-env
          message: |
            ### Preview environment

            Deployed via Flux (reconciles within ~1 min). Runs the **real** proxmox-backup-client
            against PBS and is Authelia-gated.

            - Preview URL: ${{ needs.deploy-preview.outputs.preview_url }}

            Closing the PR removes the env via `pr-preview-cleanup.yml`.
