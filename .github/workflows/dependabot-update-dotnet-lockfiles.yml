name: "Automatically update dotnet lockfiles in dependabot PRs"

# When Dependabot bumps a NuGet package, the committed packages.lock.json must be regenerated or the
# locked-mode restore fails. This reusable workflow does that on the Dependabot PR branch.
# Requires repo secret WORKFLOW_TOKEN (PAT that can push to the PR branch and re-trigger CI).

on:
  pull_request_target:
    types:
      - labeled
      - synchronize

jobs:
  update-lockfiles:
    uses: hwinther/reusable-workflows/.github/workflows/dependabot-update-dotnet-lockfiles.yml@f65228ea4276b3ff26409146ccd1191c728c811a # v1.65.0
    permissions:
      contents: read
    with:
      solution_path: backend
      solution_name: PbsBrowser.slnx
      dotnet_version: 10.0.x
    secrets:
      WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
